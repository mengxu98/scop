# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

name: test-coverage

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      package_changed: ${{ steps.filter.outputs.package_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              echo "package_changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # `github.event.before` may be unreachable after a force-push.
          # In that case, run coverage rather than failing while filtering.
          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(git diff --name-only "$base" "$head")"
          echo "$files"
          if printf '%s\n' "$files" |
            grep -Ev '^(scripts/.*|\.github/workflows/(pkgdown|test-coverage)\.yaml)$' |
            grep -q .; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "package_changed=false" >> "$GITHUB_OUTPUT"
          fi

  test-coverage:
    needs: changes
    if: needs.changes.outputs.package_changed == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        env:
          GITHUB_PAT: ${{ github.token }}
        with:
          extra-packages: any::covr
          needs: coverage
          cache: true
          cache-version: 2

      - name: Compute optional R dependency cache key 🔑
        id: optional-r-deps
        shell: bash
        run: |
          manifest_path="${RUNNER_TEMP}/scop-optional-r-deps.txt"
          SCOP_DEP_MANIFEST="$manifest_path" Rscript tools/ci/optional-r-deps.R
          if command -v shasum >/dev/null 2>&1; then
            manifest_hash="$(shasum -a 256 "$manifest_path" | cut -d ' ' -f 1)"
          else
            manifest_hash="$(SCOP_DEP_MANIFEST="$manifest_path" Rscript -e 'cat(unname(tools::md5sum(Sys.getenv("SCOP_DEP_MANIFEST"))))')"
          fi
          echo "r-version=$(Rscript -e 'cat(as.character(getRversion()))')" >> "$GITHUB_OUTPUT"
          echo "hash=$manifest_hash" >> "$GITHUB_OUTPUT"

      - name: Restore optional R package cache ♻️
        id: optional-r-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/scop-optional-r-library
          key: scop-optional-r-v1-${{ runner.os }}-r${{ steps.optional-r-deps.outputs.r-version }}-${{ steps.optional-r-deps.outputs.hash }}

      - name: Use optional R package cache 📦
        env:
          SCOP_OPTIONAL_R_LIB: ${{ runner.temp }}/scop-optional-r-library
        run: |
          optional_lib <- Sys.getenv("SCOP_OPTIONAL_R_LIB")
          user_lib <- Sys.getenv("R_LIBS_USER")
          dir.create(optional_lib, recursive = TRUE, showWarnings = FALSE)
          combined_libs <- paste(c(user_lib[nzchar(user_lib)], optional_lib), collapse = .Platform$path.sep)
          cat("R_LIBS_USER=", combined_libs, "\n", sep = "", file = Sys.getenv("GITHUB_ENV"), append = TRUE)
        shell: Rscript {0}

      - name: Report optional R cache status 🔎
        run: |
          echo "optional R cache hit: ${{ steps.optional-r-cache.outputs.cache-hit }}"

      - name: Test coverage 📊
        continue-on-error: true
        run: |
          covr_flags <- getOption("covr.flags")
          options(covr.flags = stats::setNames(rep("", length(covr_flags)), names(covr_flags)))
          covr::codecov(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(Sys.getenv("RUNNER_TEMP"), "package")
          )
        shell: Rscript {0}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find ${{ runner.temp }}/package -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
