# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release', check-args: 'c("--no-manual", "--as-cran", "--no-examples")'}
          - {os: windows-latest, r: 'release', check-args: 'c("--no-manual", "--as-cran", "--no-examples")'}
          - {os: ubuntu-latest, r: 'release', check-args: 'c("--no-manual", "--as-cran", "--no-examples")'}

    env:
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        env:
          GITHUB_PAT: ${{ github.token }}
        with:
          extra-packages: any::rcmdcheck
          needs: check
          cache: true
          cache-version: 2

      - name: Compute optional R dependency cache key 🔑
        id: optional-r-deps
        shell: bash
        run: |
          manifest_path="${RUNNER_TEMP}/scop-optional-r-deps.txt"
          SCOP_DEP_MANIFEST="$manifest_path" Rscript tools/ci/optional-r-deps.R
          manifest_hash="$(SCOP_DEP_MANIFEST="$manifest_path" Rscript -e 'cat(unname(tools::md5sum(Sys.getenv("SCOP_DEP_MANIFEST"))))')"
          echo "r-version=$(Rscript -e 'cat(as.character(getRversion()))')" >> "$GITHUB_OUTPUT"
          echo "hash=$manifest_hash" >> "$GITHUB_OUTPUT"

      - name: Restore optional R package cache ♻️
        id: optional-r-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/scop-optional-r-library
          key: scop-optional-r-v1-${{ runner.os }}-r${{ steps.optional-r-deps.outputs.r-version }}-${{ steps.optional-r-deps.outputs.hash }}

      - name: Install optional R backends 📦
        env:
          SCOP_OPTIONAL_R_LIB: ${{ runner.temp }}/scop-optional-r-library
        run: |
          optional_lib <- Sys.getenv("SCOP_OPTIONAL_R_LIB")
          user_lib <- Sys.getenv("R_LIBS_USER")
          dir.create(optional_lib, recursive = TRUE, showWarnings = FALSE)
          .libPaths(c(optional_lib, .libPaths()))
          source("tools/ci/optional-r-deps.R", local = TRUE)
          thisutils::check_r(optional_r_packages(), dependencies = NA, verbose = TRUE)
          combined_libs <- paste(c(optional_lib, user_lib), collapse = .Platform$path.sep)
          cat("R_LIBS_USER=", combined_libs, "\n", sep = "", file = Sys.getenv("GITHUB_ENV"), append = TRUE)
        shell: Rscript {0}

      - name: Save optional R package cache 💾
        if: steps.optional-r-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: ${{ runner.temp }}/scop-optional-r-library
          key: scop-optional-r-v1-${{ runner.os }}-r${{ steps.optional-r-deps.outputs.r-version }}-${{ steps.optional-r-deps.outputs.hash }}

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: ${{ matrix.config.check-args }}
          build_args: '"--no-manual"'
          error-on: '"error"'
          upload-snapshots: true
