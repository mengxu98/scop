# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest, r: 'release', check-args: 'c("--no-manual", "--as-cran", "--no-examples")'}
          - {os: windows-latest, r: 'release', check-args: 'c("--no-manual", "--as-cran", "--no-examples")'}
          - {os: ubuntu-latest, r: 'release', check-args: 'c("--no-manual", "--as-cran", "--no-examples")'}

    env:
      R_KEEP_PKG_SOURCE: yes
      _R_CHECK_FORCE_SUGGESTS_: false

    steps:
      - uses: actions/checkout@v5

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Capture R library path 🔍
        id: r-info
        shell: bash
        run: |
          echo "r-version=$(Rscript -e 'cat(as.character(getRversion()))')" >> "$GITHUB_OUTPUT"
          echo "r-lib=$(Rscript -e 'cat(.libPaths()[1])')" >> "$GITHUB_OUTPUT"

      # We manage the cache ourselves instead of relying on
      # setup-r-dependencies' built-in cache, whose key includes the
      # DESCRIPTION hash.  During active development the hash changes
      # frequently, so the built-in cache almost always misses and
      # Ubuntu is forced to recompile heavy bioinfomatics packages
      # from source (~60 min).  With a stable key (OS + R version
      # only), the cache survives DESCRIPTION-only bumps.
      - name: Restore R package cache ♻️
        id: r-pkg-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ steps.r-info.outputs.r-lib }}
          key: r-hard-v1-${{ runner.os }}-r${{ steps.r-info.outputs.r-version }}-${{ github.run_id }}-${{ github.run_attempt }}
          restore-keys: |
            r-hard-v1-${{ runner.os }}-r${{ steps.r-info.outputs.r-version }}-

      - uses: r-lib/actions/setup-r-dependencies@v2
        env:
          GITHUB_PAT: ${{ github.token }}
        with:
          extra-packages: any::rcmdcheck, any::testthat
          needs: check
          dependencies: '"hard"'
          cache: false

      - name: Save R package cache 💾
        uses: actions/cache/save@v5
        with:
          path: ${{ steps.r-info.outputs.r-lib }}
          key: r-hard-v1-${{ runner.os }}-r${{ steps.r-info.outputs.r-version }}-${{ github.run_id }}-${{ github.run_attempt }}

      - uses: r-lib/actions/check-r-package@v2
        with:
          args: ${{ matrix.config.check-args }}
          build_args: '"--no-manual"'
          error-on: '"error"'
          upload-snapshots: true
