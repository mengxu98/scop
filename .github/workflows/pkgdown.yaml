# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  release:
    types: [published]
  schedule:
    # 02:00 Monday Asia/Shanghai, expressed in UTC for GitHub Actions.
    - cron: '0 18 * * 0'
  workflow_dispatch:

name: pkgdown

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      package_changed: ${{ steps.filter.outputs.package_changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              echo "package_changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # `github.event.before` may be unreachable after a force-push.
          # In that case, build the site rather than failing while filtering.
          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(git diff --name-only "$base" "$head")"
          echo "$files"
          # Deploy only when rendered website inputs change. Source-only
          # changes are covered by R-CMD-check; their documentation is
          # regenerated when the corresponding man pages are committed.
          if printf '%s\n' "$files" |
            grep -E '^(README\.md|NEWS\.md|DESCRIPTION|_pkgdown\.yml|man/|vignettes/|articles/|pkgdown/|inst/pkgdown/)' |
            grep -q .; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "package_changed=false" >> "$GITHUB_OUTPUT"
          fi

  pkgdown:
    needs: changes
    if: needs.changes.outputs.package_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        env:
          GITHUB_PAT: ${{ github.token }}
        with:
          extra-packages: any::pkgdown any::pkgload, local::.
          needs: website
          cache: true
          cache-version: 2

      - name: Compute optional R dependency cache key 🔑
        id: optional-r-deps
        shell: bash
        run: |
          manifest_path="${RUNNER_TEMP}/scop-optional-r-deps.txt"
          SCOP_DEP_MANIFEST="$manifest_path" Rscript -e '
            pkgload::load_all(".", quiet = TRUE, compile = FALSE)
            writeLines(sort(scop:::env_r_packages()), Sys.getenv("SCOP_DEP_MANIFEST"))
          '
          manifest_hash="$(shasum -a 256 "$manifest_path" | cut -d ' ' -f 1)"
          echo "r-version=$(Rscript -e 'cat(as.character(getRversion()))')" >> "$GITHUB_OUTPUT"
          echo "hash=$manifest_hash" >> "$GITHUB_OUTPUT"

      - name: Restore optional R package cache ♻️
        id: optional-r-cache
        uses: actions/cache/restore@v5
        with:
          path: ${{ runner.temp }}/scop-optional-r-library
          key: scop-optional-r-v1-${{ runner.os }}-r${{ steps.optional-r-deps.outputs.r-version }}-${{ steps.optional-r-deps.outputs.hash }}

      - name: Use optional R package cache 📦
        env:
          SCOP_OPTIONAL_R_LIB: ${{ runner.temp }}/scop-optional-r-library
        run: |
          optional_lib <- Sys.getenv("SCOP_OPTIONAL_R_LIB")
          user_lib <- Sys.getenv("R_LIBS_USER")
          dir.create(optional_lib, recursive = TRUE, showWarnings = FALSE)
          combined_libs <- paste(c(optional_lib, user_lib[nzchar(user_lib)]), collapse = .Platform$path.sep)
          cat("R_LIBS_USER=", combined_libs, "\n", sep = "", file = Sys.getenv("GITHUB_ENV"), append = TRUE)
        shell: Rscript {0}

      - name: Report optional R cache status 🔎
        run: |
          echo "optional R cache hit: ${{ steps.optional-r-cache.outputs.cache-hit }}"

      - name: Determine pkgdown scope
        id: scope
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "article_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [[ "$base" =~ ^0+$ ]]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "article_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # The previous SHA can be unreachable after a force-push. The safe
          # fallback is a complete build, not a failed change filter.
          if ! git cat-file -e "$base^{commit}" 2>/dev/null; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "article_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-status "$base" "$head" > changed-files.txt
          cat changed-files.txt

          awk '$2 !~ /^(scripts\/|tests\/|[.]github\/workflows\/(pkgdown|test-coverage)[.]yaml$)/ { print }' changed-files.txt > pkgdown-files.txt
          if [[ ! -s pkgdown-files.txt ]]; then
            echo "full_build=false" >> "$GITHUB_OUTPUT"
            echo "article_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if awk '$1 ~ /D/ { found = 1 } END { exit found ? 0 : 1 }' pkgdown-files.txt; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "article_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if awk '$2 !~ /^vignettes\/.*[.](Rmd|qmd)$/ { found = 1 } END { exit found ? 0 : 1 }' pkgdown-files.txt; then
            article_only=false
          else
            article_only=true
          fi

          if [[ "$article_only" == "true" ]]; then
            echo "full_build=false" >> "$GITHUB_OUTPUT"
            echo "article_build=true" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if awk '$2 !~ /^(R\/.*[.]R|man\/.*[.]Rd|NEWS[.]md)$/ { found = 1 } END { exit found ? 0 : 1 }' pkgdown-files.txt; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "article_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          topics="$(
            awk '$2 ~ /^man\/.*[.]Rd$/ { path = $2; sub(/^man\//, "", path); sub(/[.]Rd$/, "", path); print path }' pkgdown-files.txt |
            sort -u |
            paste -sd, -
          )"

          if awk '$2 == "NEWS.md" { found = 1 } END { exit found ? 0 : 1 }' pkgdown-files.txt; then
            news_build=true
          else
            news_build=false
          fi

          if [[ -z "$topics" && "$news_build" == "false" ]]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "article_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            echo "news_build=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "full_build=false" >> "$GITHUB_OUTPUT"
          echo "article_build=false" >> "$GITHUB_OUTPUT"
          echo "topics=$topics" >> "$GITHUB_OUTPUT"
          echo "news_build=$news_build" >> "$GITHUB_OUTPUT"

      - name: Check reference index
        if: github.event_name == 'pull_request'
        run: |
          if (!requireNamespace("future", quietly = TRUE) ||
                !requireNamespace("future.apply", quietly = TRUE)) {
            install.packages(c("future", "future.apply"), quiet = TRUE)
          }
          future::plan("sequential", gc = TRUE)
          pkgdown::build_reference_index()
        shell: Rscript {0}

      - name: Build changed reference topics
        if: github.event_name != 'pull_request' && steps.scope.outputs.full_build == 'false' && steps.scope.outputs.article_build == 'false' && steps.scope.outputs.topics != ''
        run: |
          if (!requireNamespace("future", quietly = TRUE) ||
                !requireNamespace("future.apply", quietly = TRUE)) {
            install.packages(c("future", "future.apply"), quiet = TRUE)
          }
          future::plan("sequential", gc = TRUE)
          topics <- strsplit(Sys.getenv("PKGDOWN_TOPICS"), ",", fixed = TRUE)[[1]]
          pkgdown::build_reference(topics = topics, lazy = FALSE)
        shell: Rscript {0}
        env:
          PKGDOWN_TOPICS: ${{ steps.scope.outputs.topics }}

      - name: Build news
        if: github.event_name != 'pull_request' && steps.scope.outputs.full_build == 'false' && steps.scope.outputs.article_build == 'false' && steps.scope.outputs.news_build == 'true'
        run: |
          pkgdown::build_news(preview = FALSE)
        shell: Rscript {0}

      - name: Build articles
        if: github.event_name != 'pull_request' && steps.scope.outputs.full_build == 'false' && steps.scope.outputs.article_build == 'true'
        run: |
          if (!requireNamespace("future", quietly = TRUE) ||
                !requireNamespace("future.apply", quietly = TRUE)) {
            install.packages(c("future", "future.apply"), quiet = TRUE)
          }
          future::plan("sequential", gc = TRUE)
          pkgdown::build_articles(lazy = FALSE)
        shell: Rscript {0}

      - name: Build site
        if: github.event_name != 'pull_request' && steps.scope.outputs.full_build == 'true'
        run: |
          if (!requireNamespace("future", quietly = TRUE) ||
                !requireNamespace("future.apply", quietly = TRUE)) {
            install.packages(c("future", "future.apply"), quiet = TRUE)
          }
          future::plan("sequential", gc = TRUE)
          pkgdown::build_site(lazy = Sys.getenv("GITHUB_EVENT_NAME") != "schedule")
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          clean: ${{ github.event_name == 'schedule' }}
          branch: gh-pages
          folder: docs
