# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Need help debugging build failures? Start at https://github.com/r-lib/actions#where-to-find-help
on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]
  release:
    types: [published]
  schedule:
    # 02:00 Monday Asia/Shanghai, expressed in UTC for GitHub Actions.
    - cron: '0 18 * * 0'
  workflow_dispatch:

name: pkgdown

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      package_changed: ${{ steps.filter.outputs.package_changed }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: filter
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
          elif [[ "${{ github.event_name }}" == "push" ]]; then
            base="${{ github.event.before }}"
            head="${{ github.sha }}"
            if [[ "$base" =~ ^0+$ ]]; then
              echo "package_changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          files="$(git diff --name-only "$base" "$head")"
          echo "$files"
          if printf '%s\n' "$files" |
            grep -Ev '^(scripts/.*|tests/.*|\.github/workflows/(pkgdown|test-coverage)\.yaml)$' |
            grep -q .; then
            echo "package_changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "package_changed=false" >> "$GITHUB_OUTPUT"
          fi

  pkgdown:
    needs: changes
    if: needs.changes.outputs.package_changed == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # Only restrict concurrency for non-PR jobs
    concurrency:
      group: pkgdown-${{ github.event_name != 'pull_request' || github.run_id }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        env:
          GITHUB_PAT: ${{ github.token }}
        with:
          extra-packages: any::pkgdown, local::.
          needs: website

      - name: Determine pkgdown scope
        id: scope
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" != "push" ]]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          base="${{ github.event.before }}"
          head="${{ github.sha }}"
          if [[ "$base" =~ ^0+$ ]]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git diff --name-status "$base" "$head" > changed-files.txt
          cat changed-files.txt

          awk '$2 !~ /^(scripts\/|tests\/|[.]github\/workflows\/(pkgdown|test-coverage)[.]yaml$)/ { print }' changed-files.txt > pkgdown-files.txt
          if [[ ! -s pkgdown-files.txt ]]; then
            echo "full_build=false" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if awk '$1 ~ /D/ { found = 1 } END { exit found ? 0 : 1 }' pkgdown-files.txt; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if awk '$2 !~ /^(R\/.*[.]R|man\/.*[.]Rd)$/ { found = 1 } END { exit found ? 0 : 1 }' pkgdown-files.txt; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          topics="$(
            awk '$2 ~ /^man\/.*[.]Rd$/ { path = $2; sub(/^man\//, "", path); sub(/[.]Rd$/, "", path); print path }' pkgdown-files.txt |
            sort -u |
            paste -sd, -
          )"

          if [[ -z "$topics" ]]; then
            echo "full_build=true" >> "$GITHUB_OUTPUT"
            echo "topics=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "full_build=false" >> "$GITHUB_OUTPUT"
          echo "topics=$topics" >> "$GITHUB_OUTPUT"

      - name: Check reference index
        if: github.event_name == 'pull_request'
        run: |
          if (!requireNamespace("future", quietly = TRUE) ||
                !requireNamespace("future.apply", quietly = TRUE)) {
            install.packages(c("future", "future.apply"), quiet = TRUE)
          }
          future::plan("sequential", gc = TRUE)
          pkgdown::build_reference_index()
        shell: Rscript {0}

      - name: Build changed reference topics
        if: github.event_name != 'pull_request' && steps.scope.outputs.full_build == 'false' && steps.scope.outputs.topics != ''
        run: |
          if (!requireNamespace("future", quietly = TRUE) ||
                !requireNamespace("future.apply", quietly = TRUE)) {
            install.packages(c("future", "future.apply"), quiet = TRUE)
          }
          future::plan("sequential", gc = TRUE)
          topics <- strsplit(Sys.getenv("PKGDOWN_TOPICS"), ",", fixed = TRUE)[[1]]
          pkgdown::build_reference(topics = topics, lazy = FALSE)
        shell: Rscript {0}
        env:
          PKGDOWN_TOPICS: ${{ steps.scope.outputs.topics }}

      - name: Build site
        if: github.event_name != 'pull_request' && steps.scope.outputs.full_build == 'true'
        run: |
          if (!requireNamespace("future", quietly = TRUE) ||
                !requireNamespace("future.apply", quietly = TRUE)) {
            install.packages(c("future", "future.apply"), quiet = TRUE)
          }
          future::plan("sequential", gc = TRUE)
          pkgdown::build_site(lazy = Sys.getenv("GITHUB_EVENT_NAME") != "schedule")
        shell: Rscript {0}

      - name: Deploy to GitHub pages 🚀
        if: github.event_name != 'pull_request'
        uses: JamesIves/github-pages-deploy-action@v4.4.1
        with:
          clean: ${{ github.event_name == 'schedule' }}
          branch: gh-pages
          folder: docs
